<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <style>
            .big-box{
              display: grid; 
              width: 200px;
              
            }
            .tavar foto{
                border-radius: 10px;
                width: 150;

            }
            .summasi{
                font-size: 20px;
                font-family: Arial;
            }
            .turi{
                font-size: 15px;
                font-family: Arial;
            }
            .aktivligi{
                font-size: 12px;
                color: gray;
            }
            .btn{
                background-color: blueviolet;
                color: azure;
                border: none;
                border-radius: 10px;
                padding-bottom: 10px;

            }
            .iconka{
                background-color: white;
                border-radius: 50%;
                width: 30px;
                height: 30px;
                border: none;
                position: absolute;
                right: 785px;
                
            }

        </style>
    <body>
        <div class="big-box">
            <div class="picture">
                <img src="klaviatura.jpg" alt="klaviatura" class="tavar foto">

            </div>
            <div class="dress">

                    <p class="summasi">588 000 som</p>
                </div>

                </div>

                </div>
            </div>
        </div>
